<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartland Ventures — Accountability Chart™</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #13161e; --surface2: #1a1e2a;
    --border: #2a2f3f; --border-edit: #3a4a6a;
    --gold: #c9a84c; --gold-light: #e8c96a; --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4d8; --text-muted: #7a7d8a; --text-dim: #4a4d5a;
    --danger: #c94c4c; --danger-dim: rgba(201,76,76,0.15);
    --success: #4ca84c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: auto; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  header { position:sticky; top:0; z-index:100; padding:14px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; background:rgba(13,15,20,0.97); backdrop-filter:blur(10px); }
  header h1 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; letter-spacing:0.02em; }
  .tag { font-size:10px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold-dim); padding:3px 9px; border-radius:2px; }
  .header-actions { margin-left:auto; display:flex; gap:10px; align-items:center; }

  .btn { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:7px 15px; border-radius:3px; cursor:pointer; border:1px solid; transition:all 0.2s; white-space:nowrap; }
  .btn-edit { background:transparent; border-color:var(--border); color:var(--text-muted); }
  .btn-edit:hover, .btn-edit.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
  .btn-export { background:transparent; border-color:var(--success); color:var(--success); }
  .btn-export:hover { background:rgba(76,168,76,0.1); }
  .btn-save { background:var(--gold); border-color:var(--gold); color:#0d0f14; font-weight:600; }
  .btn-save:hover { background:var(--gold-light); }
  .btn-cancel { background:transparent; border-color:var(--border); color:var(--text-muted); }
  .btn-cancel:hover { border-color:var(--text-muted); color:var(--text); }

  .edit-banner { display:none; background:var(--gold-dim); border-bottom:1px solid rgba(201,168,76,0.3); padding:7px 28px; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); text-align:center; }
  .edit-banner.on { display:block; }

  .chart-wrapper { position:relative; z-index:1; padding:44px 40px 80px; min-width:max-content; }

  /* TREE */
  .node-wrap { display:flex; flex-direction:column; align-items:center; }
  .vline { width:1.5px; background:var(--border); flex-shrink:0; }
  .child-col { display:flex; flex-direction:column; align-items:center; }
  .tier-row { display:flex; gap:16px; position:relative; }

  /* CARD */
  .card { width:210px; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; transition:border-color 0.25s, box-shadow 0.25s, transform 0.2s; position:relative; flex-shrink:0; }
  .card.ceo::before { content:''; display:block; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .card.vacant-card { border-style:dashed; opacity:0.72; }
  .card.vacant-card .avatar { background:transparent; border:1px dashed var(--text-dim); color:var(--text-dim); }
  .card:not(.is-editing):not(body.edit-mode .card):hover { border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,0.1); transform:translateY(-2px); }
  .card.is-open { border-color:rgba(201,168,76,0.35); }
  .card.is-editing { border-color:var(--border-edit); box-shadow:0 0 0 2px rgba(58,74,106,0.35); }

  .card-top { padding:14px 12px 10px; border-bottom:1px solid var(--border); position:relative; }
  .pencil-btn { display:none; position:absolute; top:8px; right:8px; width:22px; height:22px; background:var(--gold-dim); border:1px solid var(--gold); border-radius:3px; align-items:center; justify-content:center; cursor:pointer; font-size:11px; color:var(--gold); z-index:5; }
  body.edit-mode .pencil-btn { display:flex; }
  .avatar { width:34px; height:34px; border-radius:50%; background:var(--gold-dim); border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:700; color:var(--gold-light); margin-bottom:8px; flex-shrink:0; }
  .card-role { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:4px; }
  .card-name { font-size:11px; color:var(--gold); letter-spacing:0.06em; font-weight:500; }
  .card-name.is-vacant { color:var(--text-dim); font-style:italic; }

  .einput { background:rgba(255,255,255,0.04); border:1px solid var(--border-edit); border-radius:3px; color:var(--text); font-family:inherit; padding:4px 7px; font-size:11px; width:100%; margin-bottom:5px; outline:none; transition:border-color 0.2s; }
  .einput:focus { border-color:var(--gold); }
  .einput.role { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600; }

  .card-toggle { padding:7px 12px; display:flex; align-items:center; justify-content:space-between; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); cursor:pointer; transition:color 0.2s; user-select:none; }
  .card.is-open .card-toggle, .card:not(.is-editing):hover .card-toggle { color:var(--gold); }
  .chevron { width:10px; height:10px; border-right:1.5px solid currentColor; border-bottom:1.5px solid currentColor; transform:rotate(45deg); transition:transform 0.25s; flex-shrink:0; }
  .card.is-open .chevron { transform:rotate(-135deg); }
  body.edit-mode .card-toggle { pointer-events:none; }

  .card-body { max-height:0; overflow:hidden; transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
  .card.is-open .card-body, .card.is-editing .card-body { max-height:600px; }
  .card-body-inner { padding:10px 12px 12px; border-top:1px solid var(--border); background:var(--surface2); }
  .rlabel { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; font-weight:500; }
  .rlist { list-style:none; display:flex; flex-direction:column; gap:4px; }
  .ritem { font-size:11px; color:var(--text-muted); padding-left:12px; position:relative; line-height:1.5; }
  .ritem::before { content:'—'; position:absolute; left:0; color:var(--gold-dim); font-size:10px; }
  .ritem.editing-item::before { display:none; padding-left:0; }
  .ritem-row { display:none; align-items:center; gap:4px; width:100%; }
  .ritem.editing-item .ritem-row { display:flex; }
  .ritem.editing-item .rtext { display:none; }
  .ritem-row .einput { margin-bottom:0; }
  .btn-rm { width:20px; height:20px; border-radius:3px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:15px; line-height:1; background:var(--danger-dim); color:var(--danger); transition:background 0.15s; }
  .btn-rm:hover { background:rgba(201,76,76,0.3); }
  .add-resp-btn { display:none; margin-top:8px; width:100%; padding:5px; border:1px dashed var(--border-edit); background:transparent; color:var(--text-dim); border-radius:3px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
  .add-resp-btn:hover { border-color:var(--gold); color:var(--gold); }
  .card.is-editing .add-resp-btn { display:block; }

  .edit-bar { display:none; padding:8px 12px; border-top:1px solid var(--border-edit); gap:6px; }
  .card.is-editing .edit-bar { display:flex; }
  .btn-done { flex:1; padding:5px; background:var(--gold); border:none; color:#0d0f14; font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; border-radius:3px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-done:hover { background:var(--gold-light); }
  .btn-del { padding:5px 8px; background:var(--danger-dim); border:1px solid var(--danger); color:var(--danger); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; border-radius:3px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-del:hover { background:rgba(201,76,76,0.3); }

  /* ADD SEAT BTN */
  .add-seat { width:210px; min-height:88px; border:1.5px dashed var(--border-edit); border-radius:6px; background:transparent; color:var(--text-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; display:none; align-items:center; justify-content:center; flex-direction:column; gap:6px; flex-shrink:0; font-family:'DM Sans',sans-serif; }
  .add-seat .plus { font-size:22px; font-weight:300; line-height:1; }
  body.edit-mode .add-seat { display:flex; }
  .add-seat:hover { border-color:var(--gold); color:var(--gold); }

  /* MODAL */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); z-index:200; align-items:center; justify-content:center; }
  .modal-bg.on { display:flex; }
  .modal { background:var(--surface2); border:1px solid var(--border-edit); border-radius:8px; padding:24px; width:330px; }
  .modal h3 { font-family:'Cormorant Garamond',serif; font-size:19px; margin-bottom:16px; }
  .modal label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:5px; margin-top:12px; font-weight:500; }
  .modal .einput { font-size:12px; }
  .modal textarea.einput { resize:vertical; font-family:inherit; min-height:80px; }
  .modal-btns { display:flex; gap:8px; margin-top:18px; }
  .modal-btns .btn { flex:1; padding:9px; justify-content:center; }

  footer { position:relative; z-index:10; text-align:center; padding:20px; font-size:11px; color:var(--text-dim); letter-spacing:0.08em; border-top:1px solid var(--border); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .card { animation:fadeUp 0.45s ease both; }
</style>
</head>
<body>

<header>
  <h1>Heartland Ventures</h1>
  <span class="tag">Accountability Chart™</span>
  <div class="header-actions">
    <button class="btn btn-edit" id="editBtn" onclick="toggleEdit()">✏ &nbsp;Edit Chart</button>
    <button class="btn btn-export" onclick="exportFile()">↓ &nbsp;Download Updated File</button>
  </div>
</header>
<div class="edit-banner" id="banner">✏ &nbsp; Edit Mode is ON — click the pencil icon on any card to edit it. Click "Done" to save changes.</div>

<div id="chart" class="chart-wrapper"></div>

<footer>Heartland Ventures &nbsp;·&nbsp; Accountability Chart™ &nbsp;·&nbsp; Primary Chart — 10/14</footer>

<!-- ADD SEAT MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Add New Seat</h3>
    <label>Seat / Role Title</label>
    <input class="einput role" id="mRole" placeholder="e.g. Community — Detroit Market">
    <label>Person's Name</label>
    <input class="einput" id="mName" placeholder="Leave blank for Open Seat">
    <label>Responsibilities (one per line)</label>
    <textarea class="einput" id="mResps" placeholder="LP Relations Execution&#10;IL Management &amp; Discovery&#10;Fundraising Execution"></textarea>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="confirmAdd()">Add Seat</button>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const orgData = {
  "id": "ceo",
  "role": "CEO / Managing Partner",
  "name": "Max Brickman",
  "resps": ["Vision", "Institutional Fundraising", "Big Relationships", "Story/Brand", "Culture", "Continuous Improvement"],
  "children": [
    {
      "id": "integrator",
      "role": "Integrator",
      "name": "Max Brickman",
      "resps": ["Lead, Manage, Accountability", "P&L", "---------------------------------", "Clarity"],
      "children": [
        {
          "id": "comm-success",
          "role": "Community Success",
          "name": "Braden Lambros",
          "resps": ["LMA", "Community Automation and Outreach Improvement", "Ventures Portco Value Add Execution", "Community Thought Leadership and Engagement", "PE Proprietary Deal Sourcing", "Community Marketing and Content Creation: **to be worked out with Cali and Conor", "PE Portfolio Operating Bench Development"],
          "children": [
            { "id": "columbus", "role": "Community — Columbus & TBD Market", "name": "Mary Kenney", "resps": ["Region 1 LP Relations Execution", "Region 1 IL Management & Discovery Execution", "Region 1 IL Creation Execution", "Region 1 Fundraising Execution", "Portfolio Intel & Introductions Execution", "Heartland Industry Knowledge"], "children": [] },
            { "id": "cincy", "role": "Community — Cincinnati & Louisville Market", "name": "Tom Williams", "resps": ["Region 2 LP Relations Execution", "Region 2 IL Management & Discovery Execution", "Region 2 IL Creation Execution", "Region 2 Fundraising Execution", "Portfolio Intel & Introductions Execution"], "children": [] },
            { "id": "indy", "role": "Community — Indy Market", "name": "Conor McGuinness", "resps": ["Region 3 LP Relations Execution", "Region 3 IL Management & Discovery Execution", "Region 3 IL Creation Execution", "Region 3 Fundraising Execution", "Portfolio Intel & Introductions Execution"], "children": [] },
            { "id": "cleveland", "role": "Community — Cleveland Market", "name": "Melissa D'elia", "resps": ["Region 4 LP Relations Execution", "Region 4 IL Creation Execution", "Region 4 IL Management & Discovery", "Region 4 Fundraising Execution", "Portfolio Intel & Introductions Execution"], "children": [] },
            { "id": "revops", "role": "Rev Ops", "name": "Koby Doughty", "resps": ["Systems Management — Affinity (CRM)", "Structure, process and insights for key areas of relationship management", "Enable data-driven insights & reporting", "Systematize best practices & operational knowledge / Best call templates", "Leverage AI to drive efficiency and scale", "Support PE Portfolio Companies GTM"], "children": [] }
          ]
        },
        {
          "id": "expansion",
          "role": "Expansion",
          "name": "Conor McGuinness",
          "resps": ["LMA", "New Market Sourcing", "Advisor Sourcing & Management", "New Market Launching"],
          "children": []
        },
        {
          "id": "pe",
          "role": "PE",
          "name": "Daniel Corbett",
          "resps": ["LMA", "Deal Diligence", "Debt and Financing", "Legal", "Sale Prep", "Value Add Strategy", "Returns"],
          "children": [
            { "id": "milan", "role": "PE Investor — Milan starting 10/27", "name": "Milan Joshi", "resps": [], "children": [] }
          ]
        },
        {
          "id": "operations",
          "role": "Operations",
          "name": "Lauren Williams",
          "resps": ["LMA", "Finance Cadence (with fractional Controller/CFO)", "Operating System & PMO", "Vendors, Tools & Data Governance", "IR/Content mgmt + Reporting + Brand", "Fund Legal/Compliance", "Human Resources"],
          "children": [
            { "id": "fractional", "role": "Fractional Controller", "name": "John Passen", "resps": ["Fund Valuations", "Audits", "Cash, A/P & A/R, Payroll", "Financial Controls", "Treasury", "PE Reporting"], "children": [] }
          ]
        },
        {
          "id": "ventures",
          "role": "Ventures",
          "name": "Max Brickman",
          "resps": ["LMA", "Portfolio Construction", "Diligence & Investment Execution", "Portfolio Management", "Returns", "Deal Sourcing"],
          "children": [
            { "id": "open-seat", "role": "Ventures", "name": "", "vacant": true, "resps": ["Co-investor Relationships", "Sourcing New Deals", "Diligence", "Deals Pipeline", "Portfolio Rocks", "Track Portfolio KPIs"], "children": [] }
          ]
        }
      ]
    },
    {
      "id": "support",
      "role": "Support",
      "name": "Hannah Milgrom",
      "resps": ["Optimize Visionary Time", "Internal and Annual Events", "Office Management", "Team Support"],
      "children": []
    }
  ]
};
// ── STATE ────────────────────────────────────────────────────────────────────
let editMode = false;
let modalTarget = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function toInitials(name) {
  if (!name) return '—';
  const p = name.trim().split(/\s+/).filter(Boolean);
  return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : p[0].slice(0,2).toUpperCase();
}
function findNode(node, id) {
  if (node.id === id) return node;
  for (const c of (node.children||[])) { const f = findNode(c,id); if(f) return f; }
  return null;
}
function deleteNode(tree, id) {
  if (!tree.children) return false;
  const i = tree.children.findIndex(c=>c.id===id);
  if (i !== -1) { tree.children.splice(i,1); return true; }
  for (const c of tree.children) if (deleteNode(c,id)) return true;
  return false;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCard(node, isCEO) {
  const vacant = !node.name || node.vacant;
  const ini = vacant ? '—' : toInitials(node.name);
  const classes = ['card', isCEO?'ceo':'', vacant?'vacant-card':''].filter(Boolean).join(' ');
  const respsHTML = (node.resps||[]).map((r,i) => `
    <li class="ritem" data-i="${i}">
      <span class="rtext">${esc(r)}</span>
      <div class="ritem-row">
        <input class="einput" value="${esc(r)}" data-nid="${node.id}" data-i="${i}">
        <button class="btn-rm" onclick="removeResp('${node.id}',${i})" title="Remove">×</button>
      </div>
    </li>`).join('');
  return `
<div class="${classes}" id="card-${node.id}">
  <div class="card-top">
    <div class="pencil-btn" onclick="startEdit('${node.id}')" title="Edit">✏</div>
    <div class="avatar" id="av-${node.id}">${esc(ini)}</div>
    <div class="card-role" id="rd-${node.id}">${esc(node.role)}</div>
    <input class="einput role" id="ri-${node.id}" value="${esc(node.role)}" style="display:none" placeholder="Seat Title">
    <div class="card-name${vacant?' is-vacant':''}" id="nd-${node.id}">${vacant?'Open Seat':esc(node.name)}</div>
    <input class="einput" id="ni-${node.id}" value="${esc(node.name||'')}" style="display:none" placeholder="Person's Name (blank = Open Seat)">
  </div>
  <div class="card-toggle" onclick="toggleOpen('${node.id}')">
    <span>Responsibilities</span><span class="chevron"></span>
  </div>
  <div class="card-body" id="cb-${node.id}">
    <div class="card-body-inner">
      <div class="rlabel">Roles &amp; Responsibilities</div>
      <ul class="rlist" id="rl-${node.id}">${respsHTML}</ul>
      <button class="add-resp-btn" onclick="addResp('${node.id}')">+ Add Responsibility</button>
    </div>
  </div>
  <div class="edit-bar">
    <button class="btn-done" onclick="doneEdit('${node.id}')">✓ Done</button>
    <button class="btn-del" onclick="deleteCard('${node.id}')">Delete</button>
  </div>
</div>`;
}

function renderSubNode(node) {
  const cardHTML = renderCard(node, false);
  const hasKids = node.children && node.children.length > 0;
  const addBtn = `<div class="child-col"><div class="vline" style="height:28px"></div><button class="add-seat" onclick="openModal('${node.id}')"><span class="plus">+</span><span>Add Seat</span></button></div>`;
  if (!hasKids) {
    return `<div class="child-col"><div class="vline" style="height:28px"></div>${cardHTML}</div>`;
  }
  return `<div class="child-col">
    <div class="vline" style="height:28px"></div>
    <div class="node-wrap">
      ${cardHTML}
      <div class="vline" style="height:28px"></div>
      <div style="position:relative">
        <div class="tier-row" id="tr-${node.id}">
          ${node.children.map(c=>renderSubNode(c)).join('')}
          ${addBtn}
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  const addBtn = `<div class="child-col"><div class="vline" style="height:28px"></div><button class="add-seat" onclick="openModal('ceo')"><span class="plus">+</span><span>Add Seat</span></button></div>`;
  document.getElementById('chart').innerHTML = `
    <div style="position:relative; z-index:1; display:flex; justify-content:center;">
      <div class="node-wrap">
        ${renderCard(orgData, true)}
        <div class="vline" style="height:28px"></div>
        <div style="position:relative">
          <div class="tier-row" id="tr-ceo">
            ${orgData.children.map(c=>renderSubNode(c)).join('')}
            ${addBtn}
          </div>
        </div>
      </div>
    </div>`;
  addHBars();
}

function addHBars() {
  document.querySelectorAll('.tier-row').forEach(row => {
    const cols = Array.from(row.children).filter(c=>c.classList.contains('child-col'));
    if (cols.length < 2) return;
    const rowR = row.getBoundingClientRect();
    const f = cols[0].querySelector('.vline');
    const l = cols[cols.length-1].querySelector('.vline');
    if (!f||!l) return;
    const fR = f.getBoundingClientRect();
    const lR = l.getBoundingClientRect();
    const left = fR.left - rowR.left + fR.width/2;
    const right = lR.left - rowR.left + lR.width/2;
    const bar = document.createElement('div');
    bar.style.cssText = `position:absolute;top:0;left:${left}px;width:${right-left}px;height:1.5px;background:var(--border);pointer-events:none;z-index:0;`;
    row.insertBefore(bar, row.firstChild);
  });
}

// ── CARD ACTIONS ─────────────────────────────────────────────────────────────
function toggleOpen(id) {
  if (editMode) return;
  document.getElementById('card-'+id).classList.toggle('is-open');
}

function startEdit(id) {
  if (!editMode) return;
  const card = document.getElementById('card-'+id);
  card.classList.add('is-editing','is-open');
  card.querySelector('#rd-'+id).style.display='none';
  card.querySelector('#ri-'+id).style.display='';
  card.querySelector('#nd-'+id).style.display='none';
  card.querySelector('#ni-'+id).style.display='';
  card.querySelectorAll('.ritem').forEach(li=>li.classList.add('editing-item'));
}

function doneEdit(id) {
  const card = document.getElementById('card-'+id);
  const node = findNode(orgData, id);
  if (!node) return;
  node.role = (document.getElementById('ri-'+id).value||'').trim() || node.role;
  node.name = (document.getElementById('ni-'+id).value||'').trim();
  node.vacant = !node.name;
  node.resps = Array.from(card.querySelectorAll('.ritem-row input')).map(i=>i.value.trim()).filter(Boolean);
  render();
  if (editMode) document.body.classList.add('edit-mode');
}

function deleteCard(id) {
  if (!confirm('Delete this seat and all its children? This cannot be undone.')) return;
  deleteNode(orgData, id);
  render();
  if (editMode) document.body.classList.add('edit-mode');
}

function addResp(id) {
  const node = findNode(orgData, id);
  if (!node) return;
  const card = document.getElementById('card-'+id);
  node.resps = Array.from(card.querySelectorAll('.ritem-row input')).map(i=>i.value.trim()).filter(Boolean);
  node.resps.push('New Responsibility');
  render();
  document.body.classList.add('edit-mode');
  startEdit(id);
  const inputs = document.querySelectorAll('#rl-'+id+' .ritem-row input');
  if (inputs.length) { const last=inputs[inputs.length-1]; last.focus(); last.select(); }
}

function removeResp(id, index) {
  const node = findNode(orgData, id);
  if (!node) return;
  const card = document.getElementById('card-'+id);
  const vals = Array.from(card.querySelectorAll('.ritem-row input')).map(i=>i.value.trim()).filter(Boolean);
  vals.splice(index,1);
  node.resps = vals;
  render();
  document.body.classList.add('edit-mode');
  startEdit(id);
}

// ── EDIT MODE ────────────────────────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('editBtn');
  const banner = document.getElementById('banner');
  if (editMode) {
    document.body.classList.add('edit-mode');
    btn.classList.add('active');
    btn.textContent = '✓  Exit Edit Mode';
    banner.classList.add('on');
  } else {
    document.querySelectorAll('.card.is-editing').forEach(c=>doneEdit(c.id.replace('card-','')));
    document.body.classList.remove('edit-mode');
    btn.classList.remove('active');
    btn.textContent = '✏ \u00A0Edit Chart';
    banner.classList.remove('on');
    render();
  }
}

// ── ADD MODAL ────────────────────────────────────────────────────────────────
function openModal(parentId) {
  modalTarget = parentId;
  document.getElementById('mRole').value='';
  document.getElementById('mName').value='';
  document.getElementById('mResps').value='';
  document.getElementById('modal').classList.add('on');
  setTimeout(()=>document.getElementById('mRole').focus(),80);
}
function closeModal() { document.getElementById('modal').classList.remove('on'); modalTarget=null; }
function confirmAdd() {
  const role = document.getElementById('mRole').value.trim();
  if (!role) { document.getElementById('mRole').focus(); return; }
  const name = document.getElementById('mName').value.trim();
  const resps = document.getElementById('mResps').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const newNode = { id:'seat-'+Date.now(), role, name, vacant:!name, resps, children:[] };
  const parent = findNode(orgData, modalTarget);
  if (parent) parent.children.push(newNode);
  closeModal();
  render();
  document.body.classList.add('edit-mode');
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportFile() {
  document.querySelectorAll('.card.is-editing').forEach(c=>doneEdit(c.id.replace('card-','')));
  const dataStr = JSON.stringify(orgData, null, 2);
  const src = document.documentElement.outerHTML;
  const updated = src.replace(/const orgData = \{[\s\S]*?\};\n\/\/ ── STATE/, `const orgData = ${dataStr};\n// ── STATE`);
  const blob = new Blob([updated], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'heartland-ventures-org-chart.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
